<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" color="#2563eb" role="img" aria-labelledby="line-md-marker-filled-title line-md-marker-filled-desc">
  <title id="line-md-marker-filled-title">marker filled</title>
  <desc id="line-md-marker-filled-desc">地图地点 - Line MD - marker-filled - MIT</desc>
	<g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
		<path d="M6 14l11 -11l4 4l-11 11l-4 -4Z" fill="none" stroke-width="2" stroke-dasharray="46">
			<animate attributeName="stroke-dashoffset" dur="0.5s" fill="freeze" values="46;0" />
		</path>
		<path d="M9 17l-2.5 2.5l-4 0l4.5 -4.5Z" fill="currentColor" opacity="0" fill-opacity="0">
			<set attributeName="opacity" to="1" begin="0.5s" fill="freeze" />
			<animate attributeName="d" begin="0.5s" dur="0.3s" fill="freeze" values="M9 17l0 0l-2 -2l0 0Z;M9 17l-2.5 2.5l-4 0l4.5 -4.5Z" />
			<animate attributeName="fill-opacity" begin="0.8s" dur="0.4s" fill="freeze" to="1" />
		</path>
	</g>
</svg>
