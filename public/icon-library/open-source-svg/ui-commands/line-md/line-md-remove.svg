<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" color="#2563eb" role="img" aria-labelledby="line-md-remove-title line-md-remove-desc">
  <title id="line-md-remove-title">remove</title>
  <desc id="line-md-remove-desc">通用命令 - Line MD - remove - MIT</desc>
